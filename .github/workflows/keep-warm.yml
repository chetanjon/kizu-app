# BACKUP warmer only. GitHub throttles high-frequency schedules on quiet
# repos to near-zero (this fired ONCE in its first 12 hours), so the real
# keep-warm is a Supabase pg_cron job ("kizu-keep-warm", every 5 min,
# net.http_get to kizu.app — see cron.job in the project DB). This stays as
# a free second layer; delete it if it ever causes noise.
# Note: GitHub also pauses schedules after 60 days without repo activity.
name: keep-warm
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # "/" is a dynamic route → boots the same Next.js function the app uses.
      - run: |
          curl -s -o /dev/null -w "kizu.app status=%{http_code} ttfb=%{time_starttransfer}s\n" https://kizu.app/
